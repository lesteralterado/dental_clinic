name: dental_clinic
description: A dental clinic mobile application with patient identification system.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  dio: ^5.3.3
  connectivity_plus: ^5.0.2

  # Local Database
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3

  # Face Recognition
  google_mlkit_face_detection: ^0.9.0
  camera: ^0.10.5+5

  # QR Code
  mobile_scanner: ^3.5.5
  qr_flutter: ^4.1.0

  # Security
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3

  # Dependency Injection
  get_it: ^7.6.4

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  shimmer: ^3.0.0

  # Utils
  uuid: ^4.2.1
  intl: ^0.18.1
  image_picker: ^1.0.4
  permission_handler: ^11.1.0

  # Settings
  shared_preferences: ^2.2.2
  local_auth: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  drift_dev: ^2.14.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
